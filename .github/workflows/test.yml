name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        run: pytest -q

  install-sh:
    # Lightweight job: lints install.sh and validates the --dry-run
    # paths run cleanly. Doesn't actually pipx install (Ubuntu
    # runners don't have a brain CLI to test against anyway).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n install.sh
        run: bash -n install.sh
      - name: --dry-run
        run: bash install.sh --dry-run
      - name: --help
        run: bash install.sh --help
