[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "vexis-agent"
version = "0.0.0"
description = "Telegram-to-Claude-Code bridge daemon for controlling an Omarchy desktop from a phone."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "python-telegram-bot>=21.0",
    "python-dotenv>=1.0",
    "aiohttp>=3.10",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[tool.setuptools.packages.find]
include = ["brains*", "transports*", "tools*", "core*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
